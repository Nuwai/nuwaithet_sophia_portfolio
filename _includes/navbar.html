{% assign current = page.url | downcase %}
{% assign contact_href = '/' | relative_url | append: '#contact' %}
{% if current == '/' %}
  {% assign contact_href = '#contact' %}
{% endif %}
<header class="site-header glass" data-site-header>
  <div class="container nav-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">NWT</span>
      <span class="brand-text">
        <span class="brand-name">Nu Wai Thet (Sophia)</span>
        <span class="brand-role">Data Scientist and ML Engineer</span>
      </span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
      <span class="sr-only">Toggle menu</span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
    </button>

    <nav class="site-nav" id="site-nav" data-nav-menu aria-label="Primary">
      <div class="nav-links">
        <a class="nav-link{% if current == '/' %} is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
        <a class="nav-link{% if current contains 'about' %} is-active{% endif %}" href="{{ '/about.html' | relative_url }}">About</a>
        <a class="nav-link{% if current contains 'projects' %} is-active{% endif %}" href="{{ '/projects.html' | relative_url }}">Projects</a>
        <a class="nav-link" href="{{ contact_href }}">Contact</a>
      </div>
      <div class="nav-icons">
        <a href="{{ site.author.github }}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
            <path d="M9 18c-4.51 2-5-2-7-2"/>
          </svg>
        </a>
        <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect width="4" height="12" x="2" y="9"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
        <a href="mailto:{{ site.author.email }}" aria-label="Email">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/>
            <rect x="2" y="4" width="20" height="16" rx="2"/>
          </svg>
        </a>
      </div>
    </nav>
  </div>
</header>
